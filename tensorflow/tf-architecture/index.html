            <p><code>텐서플로우</code>는 큰 규모의 <code>분산</code> 기반의 <code>학습</code>과 <code>추론</code>을 고려해 설계 됐습니다. 새로운 기계 학습 알고리즘이 나오더라도 이를 지원할 수 있으며, <code>시스템 레벨</code>의 최적화도 지원합니다. 다음 그림은 텐서플로우의 아키텍처입니다.</p>
<p><img src="../tf-architecture.png" alt=""></p>
